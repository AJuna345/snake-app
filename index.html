<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNCAFFEINATED - Polished Snake</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles/game.css" rel="stylesheet">
</head>
    
<body class="theme-classic">
    
    <script>
        const savedTheme = localStorage.getItem('snakeTheme') || 'classic';
        document.body.className = `theme-${savedTheme}`;
    </script>

    <header class="py-3 border-bottom mb-4">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <h1 class="display-6 fw-bold site-title m-0">UNCAFFEINATED SNAKE</h1>
            <a href="pages/how-play.html" class="btn btn-outline-secondary btn-sm">How to Play</a>
        </div>
    </header>

    <main class="container-fluid px-4 pb-5">
        <div class="row flex-column-reverse flex-lg-row">
            
            <div class="col-lg-3 col-xl-3 mb-4">
                <div class="card shadow-lg border-secondary rounded-4 overflow-hidden h-100" style="background-color: var(--canvas-bg);">
                    <div class="card-header text-center border-secondary py-3" style="background-color: var(--border-color); color: var(--bg-color);">
                        <h5 class="m-0 fw-bold text-uppercase tracking-wide">Command Center</h5>
                    </div>
                    
                    <div class="card-body d-flex flex-column gap-4 p-4">
                        
                        <div class="hud-panel p-3 rounded-3" style="background-color: var(--bg-color);">
                            <h6 class="text-uppercase mb-2 opacity-75" style="color: var(--text-color);">Current Score</h6>
                            <h2 id="hudScoreDisplay" class="fw-bold mb-3" style="color: var(--snake-color);">0</h2>
                            
                            <h6 class="text-uppercase mb-2 opacity-75" style="color: var(--text-color);">High Score</h6>
                            <h3 id="hudHighScoreDisplay" class="fw-bold m-0" style="color: var(--text-color);">
                                <script>document.write(JSON.parse(localStorage.getItem('snakeLeaderboard'))?.[0]?.score || 0);</script>
                            </h3>
                        </div>

                        <div class="d-grid gap-2">
                            <button id="startBtn" class="btn btn-lg fw-bold border-0" style="background-color: var(--snake-color); color: var(--canvas-bg);">
                                ▶ START GAME
                            </button>
                            <button id="restartBtn" class="btn btn-lg fw-bold btn-outline-secondary d-none">
                                ↺ RESTART
                            </button>
                        </div>

                        <div id="mobileControls" class="text-center mt-3 d-lg-none">
                            <h6 class="mb-2 opacity-75" style="color: var(--text-color);">D-Pad</h6>
                            <div class="btn-group-vertical shadow-sm">
                                <button id="upBtn" class="btn btn-secondary py-3">▲</button>
                                <div class="btn-group">
                                    <button id="leftBtn" class="btn btn-secondary px-4 py-3">◀</button>
                                    <button id="downBtn" class="btn btn-secondary px-4 py-3">▼</button>
                                    <button id="rightBtn" class="btn btn-secondary px-4 py-3">▶</button>
                                </div>
                            </div>
                        </div>

                        <hr class="border-secondary opacity-25">

                        <button type="button" class="btn btn-outline-secondary w-100 fw-bold" data-bs-toggle="modal" data-bs-target="#leaderboardModal">
                            🏆 GLOBAL LEADERBOARD
                        </button>
                        
                        <button type="button" class="btn btn-outline-secondary w-100 fw-bold mt-2" data-bs-toggle="modal" data-bs-target="#settingsModal">
                            ⚙️ GAME SETTINGS
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-9 col-xl-9 mb-4">
                <div class="card shadow-lg border-secondary rounded-4 overflow-hidden h-100" style="background-color: var(--bg-color);">
                    <div class="card-body p-0 d-flex justify-content-center align-items-center position-relative" style="min-height: 65vh;">
                        
                        <div id="startScreen" class="position-absolute w-100 h-100 d-flex flex-column justify-content-center align-items-center z-2" style="background-color: rgba(0,0,0,0.85); backdrop-filter: blur(4px);">
                            <h2 class="fw-bold mb-3 text-white">System Ready</h2>
                            <p class="text-white-50 mb-4">Use Arrow Keys or Mobile D-Pad to navigate.</p>
                            <p class="text-info small border border-info rounded px-3 py-1">Click START GAME on the left</p>
                        </div>

                        <div id="gameOverScreen" class="position-absolute w-100 h-100 d-flex flex-column justify-content-center align-items-center z-2 d-none" style="background-color: rgba(255, 0, 0, 0.2); backdrop-filter: blur(6px);">
                            <h1 class="fw-bold display-3 text-white text-shadow-sm mb-0">CRITICAL FAILURE</h1>
                            <p class="fs-4 text-white mt-3">Final Score: <span id="finalScore" class="fw-bold" style="color: var(--snake-color);">0</span></p>
                        </div>

                        <div id="game-board" class="w-100 h-100 d-flex justify-content-center align-items-center p-3">
                            </div>

                    </div>
                </div>
            </div>

        </div>
    </main>

    <div class="modal fade" id="leaderboardModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="background-color: var(--canvas-bg); color: var(--text-color);">
                <div class="modal-header border-secondary" style="background-color: var(--bg-color);">
                    <h5 class="modal-title fw-bold">Top Pilots</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="filter: invert(1); opacity: 0.5;"></button>
                </div>
                <div class="modal-body p-0">
                    <table class="table table-borderless mb-0 text-center" style="--bs-table-bg: transparent; --bs-table-color: var(--text-color);">
                        <thead class="border-bottom border-secondary opacity-75">
                            <tr>
                                <th class="py-3">Rank</th>
                                <th class="py-3">Player</th>
                                <th class="py-3">Score</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            </tbody>
                    </table>
                </div>
                <div class="modal-footer border-secondary justify-content-end" style="background-color: var(--bg-color);">
                    <button id="clearLeaderboardBtn" class="btn btn-sm btn-outline-danger">Wipe Data</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="background-color: var(--canvas-bg); color: var(--text-color);">
                <div class="modal-header border-secondary" style="background-color: var(--bg-color);">
                    <h5 class="modal-title fw-bold">Game Settings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="filter: invert(1); opacity: 0.5;"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Pilot Name</label>
                        <input type="text" id="playerNameInput" class="form-control bg-transparent border-secondary" style="color: var(--text-color);" placeholder="Enter your initials">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">UI Theme</label>
                        <select id="themeSelect" class="form-select bg-transparent border-secondary" style="color: var(--text-color);">
                            <option value="classic" class="text-dark">Classic</option>
                            <option value="dark" class="text-dark">Dark Mode</option>
                            <option value="neon" class="text-dark">Cyber Neon</option>
                            <option value="garfield" class="text-dark">Garfield (Easter Egg)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Difficulty (Speed)</label>
                        <select id="speedSelect" class="form-select bg-transparent border-secondary" style="color: var(--text-color);">
                            <option value="10" class="text-dark">Slow (Training)</option>
                            <option value="7" class="text-dark">Normal</option>
                            <option value="5" class="text-dark">Fast</option>
                            <option value="3" class="text-dark">Insane</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-secondary" style="background-color: var(--bg-color);">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="saveSettingsBtn" class="btn" style="background-color: var(--snake-color); color: var(--canvas-bg);" data-bs-dismiss="modal">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="scripts/storage.js"></script>
    <script type="module" src="scripts/leaderboard.js"></script>
    <script type="module" src="scripts/game.js"></script>
</body>
</html>
